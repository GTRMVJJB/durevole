<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Durevole B.V. – Vakmanschap zonder zorgen | Amstelveen</title>
<meta name="description" content="Durevole B.V. – Exclusieve renovaties in Amstelveen en omgeving. Badkamers, keukens, uitbouwen en complete woningrenovaties. Vakmanschap zonder zorgen." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,600&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          'rich-black': '#080808',
          'gold': '#C5A059',
          'gold-light': '#D4B575',
          'gold-dark': '#A08040',
          'slate-dark': '#2D2D30',
          'slate-mid': '#3D3D42',
          'slate-light': '#6B6B72',
          'off-white': '#F0EDE8',
          'warm-white': '#FAF8F5',
        },
        fontFamily: {
          'serif': ['Cormorant Garamond', 'Georgia', 'serif'],
          'sans': ['Montserrat', 'sans-serif'],
        },
      }
    }
  }
</script>
<style>
  :root {
    --gold: #C5A059;
    --gold-light: #D4B575;
    --black: #080808;
    --slate: #2D2D30;
  }

  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background-color: #080808;
    color: #F0EDE8;
    font-family: 'Montserrat', sans-serif;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.5;
  }

  .gold-text {
    background: linear-gradient(135deg, #C5A059 0%, #E8D090 50%, #C5A059 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .navbar {
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    background: rgba(8, 8, 8, 0.75);
    border-bottom: 1px solid rgba(197, 160, 89, 0.15);
  }

  .hero-bg {
    background:
      linear-gradient(to bottom, rgba(8,8,8,0.35) 0%, rgba(8,8,8,0.55) 60%, rgba(8,8,8,1) 100%),
      url('https://images.unsplash.com/photo-1600607687939-ce8a6c25118c?w=1800&q=85&auto=format') center/cover no-repeat;
  }

  .hero-line {
    display: block;
    overflow: hidden;
  }

  .hero-line span {
    display: block;
    transform: translateY(110%);
    opacity: 0;
    animation: slideUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  .hero-line:nth-child(1) span { animation-delay: 0.1s; }
  .hero-line:nth-child(2) span { animation-delay: 0.25s; }
  .hero-line:nth-child(3) span { animation-delay: 0.4s; }

  @keyframes slideUp {
    to { transform: translateY(0); opacity: 1; }
  }

  .fade-up {
    opacity: 0;
    transform: translateY(40px);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }
  .fade-up.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .fade-in {
    opacity: 0;
    transition: opacity 0.9s ease;
  }
  .fade-in.visible { opacity: 1; }

  .gold-line {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .service-card {
    background: linear-gradient(145deg, #1a1a1c, #111112);
    border: 1px solid rgba(197,160,89,0.12);
    transition: all 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    position: relative;
    overflow: hidden;
  }

  .service-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(145deg, rgba(197,160,89,0.05), transparent 60%);
    opacity: 0;
    transition: opacity 0.45s ease;
  }

  .service-card:hover {
    border-color: rgba(197,160,89,0.45);
    transform: translateY(-6px);
    box-shadow: 0 24px 60px rgba(0,0,0,0.6), 0 0 40px rgba(197,160,89,0.08);
  }

  .service-card:hover::before { opacity: 1; }

  .service-card:hover .card-icon {
    color: var(--gold);
    transform: scale(1.1);
  }

  .card-icon {
    transition: all 0.4s ease;
    color: rgba(197,160,89,0.6);
  }

  .portfolio-item {
    position: relative;
    overflow: hidden;
    background: #111;
    aspect-ratio: 4/3;
  }

  .portfolio-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    filter: brightness(0.7) saturate(0.8);
  }

  .portfolio-item:hover img {
    transform: scale(1.07);
    filter: brightness(0.85) saturate(1);
  }

  .portfolio
